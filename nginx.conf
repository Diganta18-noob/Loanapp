# Master Nginx configuration template for a VPS Split Deployment
# Place this configuration in /etc/nginx/sites-available/loanapp and symlink to sites-enabled.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS (uncomment when SSL certificate is installed)
    # return 301 https://$host$request_uri;

    # Root directory for static React frontend files
    location / {
        root /var/www/loanapp/client/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Node.js Express server running on port 5000
    location ~ ^/(user|loan|loanApplication|auditLog|chatbot)/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Security and Client headers passed to backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase request limits for file uploads
        client_max_body_size 50M;
    }

    # Proxy static uploads folder (handled by server upload filesystem)
    location /uploads/ {
        proxy_pass http://localhost:5000/uploads/;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }
}
